version: '3'

vars:
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v2.4.0'
  GCI_VERSION: 'v0.13.6'
  GOFUMPT_VERSION: 'v0.8.0'
  BUF_VERSION: '1.53.0'
  PROTOC_GEN_GO_VERSION: 'v1.36.6'
  PROTOC_GEN_GO_GRPC_VERSION: 'v1.5.1'
  OGEN_VERSION: 'v1.12.0'
  YQ_VERSION: 'v4.45.2'
  GRPCURL_VERSION: 'v1.9.3'
  MOCKERY_VERSION: 'v2.53.3'

  BIN_DIR: '{{.ROOT_DIR}}/bin'

  # Бинари — с .exe на Windows, без на Linux/Mac
  EXT:
    sh: 'if [ "{{OS}}" = "windows" ]; then echo ".exe"; else echo ""; fi'
  GOLANGCI_LINT: '{{.BIN_DIR}}/golangci-lint{{.EXT}}'
  GCI:           '{{.BIN_DIR}}/gci{{.EXT}}'
  GOFUMPT:       '{{.BIN_DIR}}/gofumpt{{.EXT}}'
  BUF:           '{{.BIN_DIR}}/buf{{.EXT}}'
  OGEN:          '{{.BIN_DIR}}/ogen{{.EXT}}'
  YQ:            '{{.BIN_DIR}}/yq{{.EXT}}'
  PROTOC_GEN_GO:      '{{.BIN_DIR}}/protoc-gen-go{{.EXT}}'
  PROTOC_GEN_GO_GRPC: '{{.BIN_DIR}}/protoc-gen-go-grpc{{.EXT}}'
  GRPCURL:       '{{.BIN_DIR}}/grpcurl{{.EXT}}'
  MOCKERY:       '{{.BIN_DIR}}/mockery{{.EXT}}'

  NODE_MODULES_DIR: '{{.ROOT_DIR}}/node_modules/.bin'
  REDOCLY: '{{.NODE_MODULES_DIR}}/redocly'

  OPEN_API_ORDER_V1_BASE:   '{{.ROOT_DIR}}/shared/api/order/v1/order.openapi.yaml'
  OPEN_API_ORDER_V1_BUNDLE: '{{.ROOT_DIR}}/shared/api/bundles/order.openapi.v1.bundle.yaml'
  OPEN_API_FILES: '{{.ROOT_DIR}}/shared/api/bundles'

  MODULES: inventory order payment
  GCI_PREFIX: github.com/cybervasyan/pdididy-project
  COVERAGE_DIR: '{{.ROOT_DIR}}/coverage'
  COVERAGE_FILE: total.out

tasks:
  # ─── install-tool (универсальный) ──────────────────────────────────────────
  _install-tool:
    internal: true
    cmds:
      - platforms: [linux, darwin]
        cmd: |
          if [ ! -f "{{.TOOL_PATH}}" ]; then
            echo "Installing {{.PACKAGE}}@{{.VERSION}}..."
            mkdir -p "{{.BIN_DIR}}"
            GOBIN="{{.BIN_DIR}}" go install "{{.PACKAGE}}@{{.VERSION}}"
          fi
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -File scripts/install-tool.ps1 -BinDir "{{.BIN_DIR}}" -ToolPath "{{.TOOL_PATH}}" -Package "{{.PACKAGE}}" -Version "{{.VERSION}}"

  # ─── Formatters ────────────────────────────────────────────────────────────
  install-formatters:
    desc: "Устанавливает форматтеры gci и gofumpt в ./bin"
    cmds:
      - task: _install-tool
        vars: { TOOL_PATH: '{{.GOFUMPT}}', PACKAGE: mvdan.cc/gofumpt, VERSION: '{{.GOFUMPT_VERSION}}' }
      - task: _install-tool
        vars: { TOOL_PATH: '{{.GCI}}', PACKAGE: github.com/daixiang0/gci, VERSION: '{{.GCI_VERSION}}' }

  format:
    desc: "Форматирует весь проект gofumpt + gci, исключая mocks"
    deps: [ install-formatters ]
    cmds:
      - platforms: [linux, darwin]
        cmd: |
          echo "Formatting with gofumpt..."
          for module in {{.MODULES}}; do
            if [ -d "$module" ]; then
              echo "  -> $module"
              find "$module" -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GOFUMPT}} -extra -w {} +
            fi
          done
          echo "Sorting imports with gci..."
          for module in {{.MODULES}}; do
            if [ -d "$module" ]; then
              echo "  -> $module"
              find "$module" -type f -name '*.go' ! -path '*/mocks/*' -exec {{.GCI}} write -s standard -s default -s "prefix({{.GCI_PREFIX}})" {} +
            fi
          done
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -File scripts/format.ps1 -Modules "{{.MODULES}}" -GofumptPath "{{.GOFUMPT}}" -GciPath "{{.GCI}}" -Prefix "{{.GCI_PREFIX}}"

  # ─── Lint ──────────────────────────────────────────────────────────────────
  install-golangci-lint:
    desc: "Устанавливает golangci-lint в каталог bin"
    cmds:
      - task: _install-tool
        vars: { TOOL_PATH: '{{.GOLANGCI_LINT}}', PACKAGE: github.com/golangci/golangci-lint/v2/cmd/golangci-lint, VERSION: '{{.GOLANGCI_LINT_VERSION}}' }

  lint:
    desc: "Запускает golangci-lint для всех модулей"
    deps: [ install-golangci-lint ]
    cmds:
      - platforms: [linux, darwin]
        cmd: |
          set -e
          ERR=0
          echo "Linting all modules..."
          for mod in {{.MODULES}}; do
            if [ -d "$mod" ]; then
              echo "  -> $mod"
              {{.GOLANGCI_LINT}} run "$mod/..." --config=.golangci.yml || ERR=1
            fi
          done
          exit $ERR
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -File scripts/lint.ps1 -Modules "{{.MODULES}}" -LintPath "{{.GOLANGCI_LINT}}"

  # ─── Buf ───────────────────────────────────────────────────────────────────
  install-buf:
    desc: "Устанавливает Buf в каталог bin"
    cmds:
      - platforms: [linux]
        cmd: |
          if [ ! -f "{{.BUF}}" ]; then
            mkdir -p "{{.BIN_DIR}}"
            curl -sSL "https://github.com/bufbuild/buf/releases/download/v{{.BUF_VERSION}}/buf-Linux-x86_64" -o "{{.BUF}}"
            chmod +x "{{.BUF}}"
          fi
      - platforms: [darwin]
        cmd: |
          if [ ! -f "{{.BUF}}" ]; then
            mkdir -p "{{.BIN_DIR}}"
            curl -sSL "https://github.com/bufbuild/buf/releases/download/v{{.BUF_VERSION}}/buf-Darwin-x86_64" -o "{{.BUF}}"
            chmod +x "{{.BUF}}"
          fi
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -Command "if (-not (Test-Path '{{.BUF}}')) { New-Item -ItemType Directory -Force -Path '{{.BIN_DIR}}' | Out-Null; Invoke-WebRequest -Uri 'https://github.com/bufbuild/buf/releases/download/v{{.BUF_VERSION}}/buf-Windows-x86_64.exe' -OutFile '{{.BUF}}' }"

  proto:install-plugins:
    desc: "Устанавливает protoc плагины в каталог bin"
    cmds:
      - task: _install-tool
        vars: { TOOL_PATH: '{{.PROTOC_GEN_GO}}', PACKAGE: google.golang.org/protobuf/cmd/protoc-gen-go, VERSION: '{{.PROTOC_GEN_GO_VERSION}}' }
      - task: _install-tool
        vars: { TOOL_PATH: '{{.PROTOC_GEN_GO_GRPC}}', PACKAGE: google.golang.org/grpc/cmd/protoc-gen-go-grpc, VERSION: '{{.PROTOC_GEN_GO_GRPC_VERSION}}' }

  proto:gen:
    deps: [ install-buf, proto:install-plugins, proto:lint ]
    desc: Генерация Go-кода из .proto
    dir: shared/proto
    cmds:
      - '{{.BUF}} generate'

  proto:lint:
    deps: [ install-buf, proto:install-plugins ]
    desc: Проверка .proto-файлов на соответствие стилю
    dir: shared/proto
    cmds:
      - '{{.BUF}} lint'

  # ─── Redocly ───────────────────────────────────────────────────────────────
  redocly-cli:install:
    desc: Установить локально Redocly CLI
    cmds:
      - platforms: [linux, darwin]
        cmd: '[ -f "{{.REDOCLY}}" ] || npm ci'
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -Command "if (-not (Test-Path '{{.REDOCLY}}')) { npm ci }"

  redocly-cli:order-v1-bundle:
    desc: Собрать OpenAPI order v1 в бандл
    deps: [ redocly-cli:install ]
    cmds:
      - '{{.REDOCLY}} bundle {{.OPEN_API_ORDER_V1_BASE}} -o {{.OPEN_API_ORDER_V1_BUNDLE}}'

  redocly-cli:bundle:
    desc: Собрать все схемы OpenAPI
    deps: [ redocly-cli:install ]
    cmds:
      - task: redocly-cli:order-v1-bundle

  # ─── ogen ──────────────────────────────────────────────────────────────────
  ogen:install:
    desc: "Скачивает ogen в папку bin"
    cmds:
      - task: _install-tool
        vars: { TOOL_PATH: '{{.OGEN}}', PACKAGE: github.com/ogen-go/ogen/cmd/ogen, VERSION: '{{.OGEN_VERSION}}' }

  yq:install:
    desc: "Устанавливает yq в bin/"
    cmds:
      - task: _install-tool
        vars: { TOOL_PATH: '{{.YQ}}', PACKAGE: github.com/mikefarah/yq/v4, VERSION: '{{.YQ_VERSION}}' }

  ogen:gen:
    desc: "Генерация Go-кода из всех OpenAPI-деклараций с x-ogen"
    deps: [ ogen:install, yq:install ]
    cmds:
      - task: redocly-cli:bundle
      - platforms: [linux, darwin]
        cmd: |
          find {{.OPEN_API_FILES}} -name '*.yaml' -o -name '*.yml' | while read -r file; do
            if grep -q 'x-ogen:' "$file"; then
              echo "Generating from: $file"
              target=$({{.YQ}} e '."x-ogen".target' "$file")
              package=$({{.YQ}} e '."x-ogen".package' "$file")
              {{.OGEN}} --target "$target" --package "$package" --clean "$file" || exit 1
            fi
          done
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -File scripts/ogen-gen.ps1 -OpenApiFiles "{{.OPEN_API_FILES}}" -YqPath "{{.YQ}}" -OgenPath "{{.OGEN}}"

  gen:
    desc: "Генерация всех proto и OpenAPI деклараций"
    cmds:
      - task: proto:gen
      - task: ogen:gen

  # ─── deps ──────────────────────────────────────────────────────────────────
  deps:update:
    desc: "Обновление зависимостей в go.mod во всех модулях"
    cmds:
      - platforms: [linux, darwin]
        cmd: |
          for mod in {{.MODULES}}; do
            if [ -d "$mod" ]; then
              echo "  -> $mod"
              (cd "$mod" && go mod tidy) || exit 1
            fi
          done
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -File scripts/deps-update.ps1 -Modules "{{.MODULES}}"

  # ─── grpcurl / test-api ────────────────────────────────────────────────────
  grpcurl:install:
    desc: "Устанавливает grpcurl в каталог bin"
    cmds:
      - task: _install-tool
        vars: { TOOL_PATH: '{{.GRPCURL}}', PACKAGE: github.com/fullstorydev/grpcurl/cmd/grpcurl, VERSION: '{{.GRPCURL_VERSION}}' }

  test-api:
    desc: "Запуск тестов для проверки API микросервисов"
    deps: [ grpcurl:install ]
    cmds:
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -File scripts/test-api.ps1 -GrpcurlPath "{{.GRPCURL}}"
      - platforms: [linux, darwin]
        cmd: scripts/test-api.sh "{{.GRPCURL}}"

  # ─── Mockery ───────────────────────────────────────────────────────────────
  mockery:install:
    desc: "Устанавливает mockery в ./bin"
    cmds:
      - task: _install-tool
        vars: { TOOL_PATH: '{{.MOCKERY}}', PACKAGE: github.com/vektra/mockery/v2, VERSION: '{{.MOCKERY_VERSION}}' }

  mockery:gen:
    desc: "Генерирует моки интерфейсов через mockery"
    deps: [ mockery:install ]
    cmds:
      - platforms: [linux, darwin]
        cmd: '{{.MOCKERY}}'
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -Command "& '{{.MOCKERY}}'"

  # ─── Tests ─────────────────────────────────────────────────────────────────
  test:
    desc: "Запускает юнит-тесты для всех модулей"
    cmds:
      - platforms: [linux, darwin]
        cmd: |
          ERR=0
          for mod in {{.MODULES}}; do
            if [ -d "$mod" ]; then
              echo "Testing $mod"
              go test -v "./$mod/..." || ERR=1
            fi
          done
          exit $ERR
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -File scripts/test.ps1 -Modules "{{.MODULES}}"

  test-coverage:
    desc: "Тесты с покрытием (service/repository), отчёт по каждому модулю + общий"
    cmds:
      - platforms: [linux, darwin]
        cmd: |
          rm -rf {{.COVERAGE_DIR}} && mkdir -p {{.COVERAGE_DIR}}
          ERR=0
          for mod in {{.MODULES}}; do
            TARGET_PKGS=$(go list "./$mod/..." \
              | grep -E '/(internal/(service|repository))' \
              | grep -vE '/(mocks|testdata|pkg|api|proto|pb|cmd)' \
              | paste -sd "," -)
            if [ -z "$TARGET_PKGS" ]; then continue; fi
            go test -coverpkg="$TARGET_PKGS" \
              -coverprofile={{.COVERAGE_DIR}}/$mod.out \
              -covermode=atomic \
              $(echo "$TARGET_PKGS" | tr "," " ") || ERR=1
          done
          if [ $ERR -ne 0 ]; then exit $ERR; fi
          for mod in {{.MODULES}}; do
            OUTFILE="{{.COVERAGE_DIR}}/$mod.out"
            [ -f "$OUTFILE" ] && { printf " * %s: " "$mod"; go tool cover -func="$OUTFILE" | tail -n1; }
          done
          { echo "mode: atomic"; find {{.COVERAGE_DIR}} -type f -name '*.out' ! -name '{{.COVERAGE_FILE}}' -exec grep -h -v "^mode:" {} +; } > {{.COVERAGE_DIR}}/{{.COVERAGE_FILE}}
          go tool cover -func={{.COVERAGE_DIR}}/{{.COVERAGE_FILE}} | tail -n1
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -File scripts/test-coverage.ps1 -Modules "{{.MODULES}}" -CoverageDir "{{.COVERAGE_DIR}}" -CoverageFile "{{.COVERAGE_FILE}}"

  coverage:html:
    desc: "Генерирует HTML-отчёт покрытия и открывает в браузере"
    deps: [ test-coverage ]
    cmds:
      - platforms: [linux, darwin]
        cmd: |
          OUTPUT={{.COVERAGE_DIR}}/coverage.html
          go tool cover -html={{.COVERAGE_DIR}}/{{.COVERAGE_FILE}} -o $OUTPUT
          if command -v open &> /dev/null; then open $OUTPUT; elif command -v xdg-open &> /dev/null; then xdg-open $OUTPUT; fi
      - platforms: [windows]
        cmd: powershell -NoProfile -NonInteractive -Command "$out = '{{.COVERAGE_DIR}}/coverage.html'; go tool cover -html='{{.COVERAGE_DIR}}/{{.COVERAGE_FILE}}' -o $out; Start-Process $out"
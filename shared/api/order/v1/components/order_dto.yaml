OrderDto:
  type: object
  required:
    - order_uuid
    - user_uuid
    - part_uuids
    - total_price
    - status
  properties:
    order_uuid:
      type: string
      format: uuid
    user_uuid:
      type: string
      format: uuid
    part_uuids:
      type: array
      items:
        type: string
        format: uuid
    total_price:
      type: number
      format: double
    transaction_uuid:
      type: string
      format: uuid
      nullable: true
    payment_method:
      $ref: './enums/payment_method.yaml#/PaymentMethod'
    status:
      $ref: './enums/order_status.yaml#/OrderStatus'

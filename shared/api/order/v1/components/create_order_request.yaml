CreateOrderRequest:
  type: object
  required:
    - user_uuid
    - part_uuids
  properties:
    user_uuid:
      type: string
      format: uuid
      description: UUID пользователя
    part_uuids:
      type: array
      items:
        type: string
        format: uuid
      minItems: 1
      description: Список UUID деталей

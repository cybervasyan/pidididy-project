post:
  summary: Отменить заказ
  operationId: cancelOrder
  tags:
    - orders
  parameters:
    - $ref: '../params/order_uuid.yaml#/OrderUuidParam'
  responses:
    '204':
      description: Заказ успешно отменён
    '404':
      description: Заказ не найден
      content:
        application/json:
          schema:
            $ref: '../components/errors/not_found_error.yaml#/NotFoundError'
    '409':
      description: Заказ уже оплачен и не может быть отменён
      content:
        application/json:
          schema:
            $ref: '../components/errors/conflict_error.yaml#/ConflictError'
    '500':
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '../components/errors/internal_server_error.yaml#/InternalServerError'
    default:
      description: Неожиданная ошибка
      content:
        application/json:
          schema:
            $ref: '../components/errors/generic_error.yaml#/GenericError'
